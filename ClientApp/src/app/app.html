@if (auth.isLoggedIn()) {
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" opened class="sidenav">
      <div class="logo">
        <mat-icon>insert_chart</mat-icon>
        <span>Mapa Mensal</span>
      </div>
      <mat-nav-list>
        @for (item of navItems(); track item.path) {
          <a mat-list-item [routerLink]="item.path" routerLinkActive="active-link">
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
            <span matListItemTitle>{{ item.label }}</span>
          </a>
        }
      </mat-nav-list>
      <div class="sidenav-footer">
        <div class="user-info">
          <mat-icon>account_circle</mat-icon>
          <div class="user-details">
            <span class="user-name">{{ auth.currentUser()?.username }}</span>
            <span class="user-role">{{ auth.currentUser()?.role === 'Admin' ? 'Administrador' : 'Utilizador' }}</span>
          </div>
        </div>
        <button mat-icon-button (click)="auth.logout()" matTooltip="Terminar sessão" class="logout-btn">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </mat-sidenav>
    <mat-sidenav-content class="main-content">
      <router-outlet />
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <router-outlet />
}
