<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon-wrap">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#534AB7"/>
          <rect x="5" y="19" width="5" height="8" rx="1.5" fill="white"/>
          <rect x="13" y="10" width="5" height="17" rx="1.5" fill="white"/>
          <rect x="21" y="14" width="5" height="13" rx="1.5" fill="white"/>
        </svg>
      </div>
      <h1>Gestor</h1>
      <p>Inicia sessão para continuar</p>
    </div>

    <form (ngSubmit)="login()" #f="ngForm">
      <div class="form-group">
        <label for="username">Utilizador</label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">person</mat-icon>
          <input id="username" type="text" [(ngModel)]="username" name="username"
                 placeholder="Nome de utilizador" autocomplete="username" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">lock</mat-icon>
          <input id="password" [type]="showPassword() ? 'text' : 'password'"
                 [(ngModel)]="password" name="password"
                 placeholder="Password" autocomplete="current-password" required />
          <button type="button" mat-icon-button class="toggle-pw"
                  (click)="showPassword.update(v => !v)">
            <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
      </div>

      @if (error()) {
        <div class="error-msg">
          <mat-icon>error_outline</mat-icon>
          {{ error() }}
        </div>
      }

      <button type="submit" class="login-btn" [disabled]="loading()">
        @if (loading()) { A entrar... } @else { Entrar }
      </button>
    </form>
  </div>
</div>
